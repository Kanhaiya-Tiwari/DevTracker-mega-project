name: Kubernetes – Deploy to EKS

on:
  workflow_call:
    inputs:
      backend_image:
        description: "Backend image URI (ECR)"
        required: true
        type: string
      frontend_image:
        description: "Frontend image URI (ECR)"
        required: true
        type: string

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  EKS_CLUSTER: devtrackr-cluster

jobs:
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create namespace (idempotent)
        run: kubectl apply -f infra/kubernetes/namespace.yaml

      - name: Ensure secrets exist
        run: |
          kubectl -n devtrackr get secret devtrackr-secrets 2>/dev/null || \
          kubectl -n devtrackr create secret generic devtrackr-secrets \
            --from-literal=postgres-user=devtrackr \
            --from-literal=postgres-password="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=jwt-secret="${{ secrets.JWT_SECRET }}" \
            --from-literal=DATABASE_URL="postgresql+asyncpg://devtrackr:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/devtrackr" \
            --from-literal=REDIS_URL="redis://redis:6379/0" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            --from-literal=OPENROUTER_MODEL="nvidia/nemotron-nano-9b-v2:free"

      - name: Deploy Postgres
        run: kubectl apply -f infra/kubernetes/postgres-statefulset.yaml

      - name: Deploy Redis
        run: kubectl apply -f infra/kubernetes/redis-deployment.yaml

      - name: Deploy backend
        run: |
          kubectl apply -f infra/kubernetes/backend-deployment.yaml
          kubectl -n devtrackr set image deployment/devtrackr-backend \
            backend=${{ inputs.backend_image }}

      - name: Deploy frontend
        run: |
          kubectl apply -f infra/kubernetes/frontend-deployment.yaml
          kubectl -n devtrackr set image deployment/devtrackr-frontend \
            frontend=${{ inputs.frontend_image }}

      - name: Deploy ingress
        run: kubectl apply -f infra/kubernetes/ingress.yaml

      - name: Deploy monitoring stack
        run: |
          kubectl apply -f infra/monitoring/namespace.yaml
          kubectl apply -f infra/monitoring/prometheus/
          kubectl apply -f infra/monitoring/grafana/

      - name: Wait for rollout
        run: |
          kubectl -n devtrackr rollout status deployment/devtrackr-backend --timeout=180s
          kubectl -n devtrackr rollout status deployment/devtrackr-frontend --timeout=180s

      - name: Smoke test
        run: |
          BACKEND_IP=$(kubectl -n devtrackr get svc backend-service -o jsonpath='{.spec.clusterIP}')
          echo "Backend service IP: ${BACKEND_IP}"
          kubectl -n devtrackr get pods
          kubectl -n devtrackr get svc
