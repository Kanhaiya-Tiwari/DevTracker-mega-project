name: Terraform – Deploy AWS Infrastructure

on:
  workflow_call:
    inputs:
      action:
        description: "Terraform action: plan or apply"
        required: false
        type: string
        default: apply

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  TF_WORKING_DIR: infra/terraform

jobs:
  terraform:
    name: "Terraform ${{ inputs.action }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -out=tfplan \
            -input=false

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Export outputs
        if: inputs.action == 'apply'
        id: tf-outputs
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecr_backend=$(terraform output -raw ecr_backend_url)" >> "$GITHUB_OUTPUT"
          echo "ecr_frontend=$(terraform output -raw ecr_frontend_url)" >> "$GITHUB_OUTPUT"

  tfsec:
    name: tfsec – Terraform Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: tfsec scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform
          soft_fail: true
