name: Docker Build & Push to ECR

on:
  workflow_call:
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        type: string
        default: production
    outputs:
      backend_image:
        description: "Full backend image URI with tag"
        value: ${{ jobs.build-push.outputs.backend_image }}
      frontend_image:
        description: "Full frontend image URI with tag"
        value: ${{ jobs.build-push.outputs.frontend_image }}

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          echo "backend_image=${REGISTRY}/devtrackr-backend:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/devtrackr-frontend:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ steps.ecr-login.outputs.registry }}/devtrackr-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend (production)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ steps.ecr-login.outputs.registry }}/devtrackr-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy scan – backend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ steps.meta.outputs.backend_image }}
          severity: CRITICAL,HIGH
          format: table
          exit-code: 0

      - name: Trivy scan – frontend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ steps.meta.outputs.frontend_image }}
          severity: CRITICAL,HIGH
          format: table
          exit-code: 0
