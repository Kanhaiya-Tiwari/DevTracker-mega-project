name: Lint & Test

on:
  workflow_call:

jobs:
  backend-lint-test:
    name: Backend – Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: devtrackr_test
          POSTGRES_USER: devtrackr
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U devtrackr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff bandit safety

      - name: Ruff lint
        run: ruff check app/

      - name: Bandit security lint
        run: bandit -r app/ -ll -q

      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt --output text || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://devtrackr:testpass@localhost:5432/devtrackr_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
        run: pytest tests/ -v --tb=short --co -q 2>/dev/null; pytest tests/ -v --tb=short || true

  frontend-lint-test:
    name: Frontend – Lint & Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build check
        run: npm run build
