name: Security Scan (DevSecOps)

on:
  workflow_call:

jobs:
  trivy-fs-scan:
    name: Trivy – Filesystem Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy FS scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
          exit-code: 0

  trivy-config-scan:
    name: Trivy – IaC Misconfig Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan Terraform & K8s configs
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: config
          scan-ref: infra/
          severity: CRITICAL,HIGH
          format: table
          exit-code: 0

  gitleaks:
    name: Gitleaks – Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  snyk-backend:
    name: Snyk – Python Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r backend/requirements.txt

      - name: Run Snyk
        uses: snyk/actions/python-3.10@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/requirements.txt --severity-threshold=high

  docker-scout:
    name: Docker Scout – Image CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image for scanning
        run: docker build -t devtrackr-backend:scan backend/

      - name: Docker Scout scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://devtrackr-backend:scan
          sarif-file: scout-results.sarif
          summary: true
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scout-results.sarif
        continue-on-error: true
