services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devtrackr
      POSTGRES_USER: devtrackr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devtrackr"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://devtrackr:${POSTGRES_PASSWORD}@postgres:5432/devtrackr
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-nvidia/nemotron-nano-9b-v2:free}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    environment:
      VITE_API_BASE_URL: /api/v1
    depends_on: [backend]

volumes:
  pgdata: