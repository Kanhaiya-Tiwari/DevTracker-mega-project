apiVersion: apps/v1
kind: Deployment
metadata:
  name: devtrackr-backend
  namespace: devtrackr
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels: {app: backend}
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}
  template:
    metadata:
      labels: {app: backend}
    spec:
      containers:
        - name: backend
          image: AWS_ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/devtrackr-backend:latest
          ports: [{containerPort: 8000}]
          envFrom:
            - secretRef: {name: devtrackr-secrets}
          resources:
            requests: {memory: "256Mi", cpu: "250m"}
            limits:   {memory: "512Mi", cpu: "500m"}
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: devtrackr
spec:
  selector: {app: backend}
  ports: [{port: 8000, targetPort: 8000}]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: devtrackr
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devtrackr-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 60}