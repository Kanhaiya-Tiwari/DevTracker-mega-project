apiVersion: v1
kind: Service
metadata:
	name: postgres
	namespace: devtrackr
spec:
	clusterIP: None
	selector:
		app: postgres
	ports:
		- port: 5432
			targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
	name: postgres
	namespace: devtrackr
spec:
	serviceName: postgres
	replicas: 1
	selector:
		matchLabels:
			app: postgres
	template:
		metadata:
			labels:
				app: postgres
		spec:
			containers:
				- name: postgres
					image: postgres:16-alpine
					ports:
						- containerPort: 5432
					env:
						- name: POSTGRES_DB
							value: devtrackr
						- name: POSTGRES_USER
							valueFrom:
								secretKeyRef:
									name: devtrackr-secrets
									key: postgres-user
						- name: POSTGRES_PASSWORD
							valueFrom:
								secretKeyRef:
									name: devtrackr-secrets
									key: postgres-password
					volumeMounts:
						- name: postgres-data
							mountPath: /var/lib/postgresql/data
					readinessProbe:
						exec:
							command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
						initialDelaySeconds: 10
						periodSeconds: 10
					livenessProbe:
						exec:
							command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
						initialDelaySeconds: 20
						periodSeconds: 20
					resources:
						requests:
							memory: "256Mi"
							cpu: "250m"
						limits:
							memory: "512Mi"
							cpu: "500m"
	volumeClaimTemplates:
		- metadata:
				name: postgres-data
			spec:
				accessModes: ["ReadWriteOnce"]
				resources:
					requests:
						storage: 10Gi
